<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Churn Portal - Login</title>
    <!-- SYSTEM MODIFICATION: Linked to local stylesheet for 100% offline styling support -->
    <link rel="stylesheet" href="/static/tailwind.css">
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">🛡️ Churn Mitigation</h1>
            <p class="text-gray-400 mt-2 text-sm">Enterprise Predictive Dashboard Authentication</p>
        </div>

        <!-- Dynamic Error Alert triggered by FastAPI routing query params -->
        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 p-3 rounded-lg text-sm mb-6 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-300">Operator Username</label>
                <input type="text" name="username" required 
                       placeholder="e.g., admin_director"
                       class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 transition">
                <span class="text-xs text-gray-500 mt-1 block">Available handles: <code class="text-blue-400">admin_director</code> or <code class="text-blue-400">agent_success</code></span>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-300">Security Password</label>
                <input type="password" name="password" required 
                       placeholder="••••••••"
                       class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 transition">
                <span class="text-xs text-gray-500 mt-1 block">Default password structure: <code class="text-blue-400">password123</code></span>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg shadow-blue-900/30">
                Secure Log In
            </button>
        </form>

        <div class="mt-8 border-t border-gray-700 pt-4 text-center text-xs text-gray-500">
            Connected to MySQL Local Server Instance
        </div>
    </div>

</body>
</html>
